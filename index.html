<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PakTeeth (PakTeeth)</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div id="page-loader">
        <div class="loader-container">
            <div class="loader"></div>
            <span class="loader-progress">0%</span>
        </div>
    </div>
    <div class="app-container">

        <!-- VIDEO BACKGROUND (FULL SCREEN) -->
        <video class="login-video-bg" autoplay muted loop playsinline preload="none">
            <!-- bg-video-left.mov excluded from web deploy; video silently absent -->
        </video>

        <!-- Overlay for gradient / readability -->
        <div class="login-overlay"></div>

        <!-- SIDE-BY-SIDE CONTENT WRAPPER -->
        <div class="login-split-layout">
            <!-- LEFT SIDE: BRAND IDENTITY -->
            <div class="brand">
                <div class="brand-header">
                    <div class="brand-logo">
                        <img src="assets/icons/256x256.png" width="60" height="60" alt="PakTeeth Logo" style="display: block;">
                    </div>
                    <h1>PakTeeth</h1>
                </div>
                <p>A Trusted Dental Management Solution for <br>Dr. Ahmad Gulzar.</p>

                <!-- NEW CONTROL BUTTONS (ELECTRON ONLY) -->
                <div id="electron-controls" class="hero-controls"
                    style="display: none; justify-content: flex-start; margin-top: 2rem;">
                    <button id="openLoginBtn" class="btn btn-neon-glow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                            <polyline points="10 17 15 12 10 7" />
                            <line x1="15" y1="12" x2="3" y2="12" />
                        </svg>
                        Sign In
                    </button>

                    <button class="btn btn-outline-dark"
                        onclick="if(window.__pakteeth__ && window.__pakteeth__.quitApp) { window.__pakteeth__.quitApp(); } else { alert('Only available in desktop mode.'); }">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                            <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                            <path d="m15 9-6 6" />
                            <path d="m9 9 6 6" />
                        </svg>
                        Exit to Desktop
                    </button>
                </div>
            </div>

            <!-- RIGHT SIDE: LOGIN ACTIONS (POPUPS OR EMBEDDED) -->
            <div class="login-actions-container">

                <!-- BROWSER FALLBACK FORM -->
                <div id="browser-login-container" class="login-card-container"
                    style="display: none; animation: pageFade 0.5s ease forwards;">
                    <div class="login-card" style="position:relative;">
                        <div
                            style="position: absolute; top: 10%; right: 10%; width: 250px; height: 250px; background: var(--neon-cyan); filter: blur(120px); opacity: 0.1; z-index: -1;">
                        </div>

                        <div
                            style="margin-bottom: 24px; display: flex; justify-content: center;">
                            <img src="assets/icons/256x256.png" alt="PakTeeth Logo" style="width: 48px; height: 48px;">
                        </div>
                        <h2
                            style="font-size: 32px; font-weight: 700; color: white; margin: 0 0 12px 0; text-align: center; letter-spacing: -0.5px;">
                            Sign In</h2>
                        <p
                            style="font-size: 15px; color: #c9e9ff; margin-bottom: 32px; text-align: center; line-height: 1.5; opacity: 0.8;">
                            Access your dental management dashboard and patient records.</p>

                        <form id="loginForm" style="display: flex; flex-direction: column;">
                            <div style="margin-bottom: 24px;">
                                <label
                                    style="font-size: 13px; font-weight: 600; color: var(--neon-cyan); margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px;"
                                    for="email">Email Address</label>
                                <input class="form-control" type="email" id="email" required
                                    placeholder="user@pakteeth.com">
                            </div>

                            <div style="margin-bottom: 24px;">
                                <label
                                    style="font-size: 13px; font-weight: 600; color: var(--neon-cyan); margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px;"
                                    for="password">Password</label>
                                <div style="position: relative; display: flex; align-items: center;">
                                    <input class="form-control" type="password" id="password" required
                                        placeholder="••••••••" style="padding-right: 45px;">
                                    <button type="button" class="btn-icon" id="togglePwd" title="Show/Hide Password"
                                        style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #c9e9ff; cursor: pointer; padding: 4px; display: flex; transition: color 0.3s;">
                                        <svg class="eye-on" viewBox="0 0 24 24"
                                            style="width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; pointer-events: none;">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                            <circle cx="12" cy="12" r="3" />
                                        </svg>
                                        <svg class="eye-off" viewBox="0 0 24 24"
                                            style="display:none; width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; pointer-events: none;">
                                            <path
                                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                                            <path
                                                d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                                            <line x1="1" y1="1" x2="23" y2="23" />
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <div id="loginError"
                                style="display: none; background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2); color: #ff4d4d; padding: 14px; border-radius: 12px; font-size: 14px; margin-top: 20px; text-align: center;">
                            </div>

                            <button class="btn-submit" type="submit"
                                style="width: 100%; padding: 18px; background: linear-gradient(135deg, #00D2FF 0%, #3a7bd5 100%); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; margin-top: 12px; box-shadow: 0 10px 20px rgba(58, 123, 213, 0.3);">Sign
                                In</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- NEW SOLID FOOTER -->
        <footer class="app-footer">
            <div class="footer-content">
                <p>&copy; 2026 | Developed by <strong>Zaid | Laiba | Ayesha</strong>. All rights reserved.</p>
            </div>
        </footer>

    </div>
    <script>
        window.addEventListener("load", function () {

            const loader = document.getElementById("page-loader");
            const progressText = document.querySelector(".loader-progress");

            let progress = 0;

            const interval = setInterval(function () {

                progress++;
                progressText.textContent = progress + "%";

                if (progress >= 100) {
                    clearInterval(interval);

                    loader.style.opacity = "0";

                    setTimeout(() => {
                        loader.style.display = "none";
                    }, 50);
                }

            }, 5); // 100 steps in 2 seconds

        });
    </script>
    <script src="js/landing.js"></script>
    <script src="/js/license-guard.js"></script>
    <!-- PakTeeth LAN Sync (Phase 1-3) -->
    <script src="/js/lib/socket.io.min.js"></script>
    <script src="/js/network-status.js"></script>
    <script src="/js/offline-queue.js"></script>
    <script src="/js/sync-overlay.js"></script>
        <script src="/js/server-standby.js"></script>
<script src="/js/socket-client.js"></script>
</body>

</html>
