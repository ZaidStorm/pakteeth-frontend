<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors & Staff | PakTeeth</title>

    <link rel="icon" type="image/png" href="../../assets/images/tooth.png">
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/modals.css">
    <link rel="stylesheet" href="../../css/doctors.css">
    <link rel="stylesheet" href="../../css/patient-grid-list-view.css">
    <link rel="stylesheet" href="../../css/dial/staff-dial.css">
    <link rel="stylesheet" href="../../css/loader/global-loader.css">
</head>

<body>

    <!-- Premium Page Loader -->
    <div id="page-loader">
        <div class="loader-content">
            <div class="loader-center-content">
                <div class="loader-icon-small"><img src="../../assets/icons/128x128.png" style="width: 48px; height: 48px;" alt="PakTeeth Logo"></div>
                <div class="loader-progress-number" id="loader-pct">0%</div>
            </div>
            <div class="loader-spinner-wrap">
                <div class="sc-loader-ring" id="loader-ring"></div>
            </div>
            <div class="loader-text">PakTeeth</div>
            <div class="loader-subtext">Initializing Staff Portal...</div>
        </div>
    </div>

    <div class="app-container">

        <!-- Top Navigation -->
        <nav class="top-nav" id="appTopNav">
            <a href="../dashboard/dashboard.html" class="nav-brand">
                <img src="../../assets/icons/64x64.png" style="width: 24px; height: 24px; margin-right: 8px;" alt="PakTeeth Logo">
                PakTeeth
            </a>

            <div class="nav-menu">
                <a href="../dashboard/dashboard.html" class="nav-item">Dashboard</a>
                <a href="../patients/patient-dashboard.html" class="nav-item">Patients</a>
                <a href="../appointments/appointments.html" class="nav-item">Appointments <span class="nav-badge" id="appt-badge"></span></a>
                <a href="../doctors/doctors.html" class="nav-item">Staff</a>
                <a href="../settings/settings.html" class="nav-item">Settings</a>

                <div class="nav-dropdown">
                    <a href="#" class="nav-item">☰</a>

                    <div class="nav-dropdown-content">
                        <a href="../analytics/analytics.html" class="nav-item">Analytics</a>
                        <a href="../capital/capital-summary.html" class="nav-item">Capital</a>
                        <a href="#" class="nav-item logout-item" onclick="APP.logout(); return false;" title="Logout">
                            Logout
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">

            <header class="page-header">
                <div class="header-title">
                    <h2>Doctors & Staff Directory</h2>
                </div>

                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="window.openStaffAssetsFolder()" title="Open Images Folder">📁 Open Image Folder</button>
                    <button class="btn btn-secondary" onclick="exportStaff()">Export CSV</button>
                    <button class="btn btn-primary" onclick="openStaffModal()">＋ Add Personnel</button>
                </div>
            </header>

            <section class="page-content">

                <div class="toolbar card">

                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
                        <select id="searchTypeStaff" class="form-control" onchange="filterStaff()">
                            <option value="all">Search By: All</option>
                            <option value="id">ID</option>
                            <option value="name">Name</option>
                            <option value="phone">Phone</option>
                            <option value="date">Date</option>
                        </select>

                        <input type="text" id="searchStaff" class="form-control" placeholder="Search name, phone, ID..."
                            onkeyup="filterStaff()">
                    </div>

                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                        <select id="filterRole" class="form-control" onchange="filterStaff()">
                            <option value="">All Roles</option>
                            <option value="Doctor">Doctors</option>
                            <option value="Hygienist">Hygienists</option>
                            <option value="Assistant">Assistants</option>
                            <option value="Receptionist">Receptionists</option>
                            <option value="Admin">System Admins</option>
                            <option value="Developer">Developers</option>
                        </select>
                    </div>

                </div>

            </section>

            <!-- Staff Grid -->
            <section>
                <div id="staffGridContainer" class="grid-mode">
                    <!-- Dynamic Cards -->
                </div>
            </section>

        </main>
    </div>

    <!-- Modal -->
    <div id="staffModal" class="modal-overlay">

        <div class="modal-content">

            <div class="modal-header">
                <h3 id="staffModalTitle">Add Staff Member</h3>
                <button class="modal-close">&times;</button>
            </div>

            <div class="modal-body">

                <form id="staffForm">
                    <input type="hidden" id="staff_id">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="staff_name" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label>Role *</label>
                            <select id="staff_role" class="form-control" required>
                                <option value="Doctor">Doctor</option>
                                <option value="Hygienist">Hygienist</option>
                                <option value="Assistant">Assistant</option>
                                <option value="Receptionist">Receptionist</option>
                                <option value="Admin">Admin</option>
                                <option value="Developer">Developer</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone *</label>
                            <input type="tel" id="staff_phone" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="staff_email" class="form-control">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Notes</label>
                            <input type="text" id="staff_spec" class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Fees</label>
                            <input type="number" id="staff_fees" class="form-control" value="0">
                        </div>
                    </div>

                </form>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.close('staffModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveStaff()">Save</button>
            </div>

        </div>
    </div>

    <script>
        window.addEventListener("load", function () {
            const loader = document.getElementById("page-loader");
            const progressBar = document.getElementById("loader-ring");
            const progressText = document.getElementById("loader-pct");

            if (!loader || !progressBar || !progressText) return;

            let progress = 0;
            const interval = setInterval(function () {
                progress += Math.floor(Math.random() * 5) + 1;
                if (progress > 100) progress = 100;

                progressBar.style.width = progress + "%";
                progressText.textContent = progress + "%";

                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        loader.style.visibility = "hidden";
                        setTimeout(() => { loader.remove(); }, 500);
                    }, 400);
                }
            }, 30);
        });
    </script>

    <script src="../../js/core.js"></script>
    <script src="../../js/dial/staff-dial.js"></script>
    <script src="../../js/doctors.js"></script>

    <script src="/js/license-guard.js"></script>
    <!-- PakTeeth LAN Sync (Phase 1-3) -->
    <script src="/js/lib/socket.io.min.js"></script>
    <script src="/js/network-status.js"></script>
    <script src="/js/offline-queue.js"></script>
    <script src="/js/sync-overlay.js"></script>
        <script src="/js/server-standby.js"></script>
<script src="/js/socket-client.js"></script>
</body>

</html>
