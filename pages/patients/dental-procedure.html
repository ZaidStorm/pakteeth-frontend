        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="header-title">
                    <button class="btn btn-icon" onclick="history.back()" title="Back">Back</button>
                    <h2>Dental Procedure Chart</h2>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="saveTeethChart()">Save Chart</button>
                </div>
            </header>

            <section class="page-content">
                <!-- Dental Chart UI -->
                <div class="dental-chart-container card" style="margin-top: 1rem;">
                    <div class="chart-legend">
                        <div class="legend-item"><span class="legend-color"
                                style="background:var(--color-primary)"></span>Normal</div>
                        <div class="legend-item"><span class="legend-color" style="background:#e74c3c"></span>Caries
                        </div>
                        <div class="legend-item"><span class="legend-color" style="background:#f1c40f"></span>Filling
                        </div>
                        <div class="legend-item"><span class="legend-color" style="background:#9b59b6"></span>Crown
                        </div>
                        <div class="legend-item"><span class="legend-color" style="background:#34495e"></span>Missing
                        </div>
                    </div>

                    <div class="jaw-section upper-jaw" id="upperJaw">
                        <div id="upperRightTeeth" class="teeth-row"></div>
                        <div id="upperLeftTeeth" class="teeth-row"></div>
                    </div>
                    <div class="jaw-divider"></div>
                    <div class="jaw-section lower-jaw" id="lowerJaw">
                        <div id="lowerLeftTeeth" class="teeth-row"></div>
                        <div id="lowerRightTeeth" class="teeth-row"></div>
                    </div>
                </div>
            </section>
        </main>

    <!-- Condition Modal -->
    <div id="conditionModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 420px;">
            <div class="modal-header">
                <h3>Tooth <span id="selectedToothNum"></span></h3>
                <button class="modal-close" onclick="Modal.close('conditionModal')">✖</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:10px;">Select Tooth Condition</p>
                <div id="conditionSelector" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
                <small style="display:block; margin-top:10px; opacity:0.7;">
                    Click a condition to apply it to the tooth
                </small>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.close('conditionModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Dental Chart Notes Modal -->
    <div id="dentalChartNotesModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add Dental Chart Notes</h3>
                <button class="modal-close">×</button>
            </div>
            <div class="modal-body">
                <form id="dentalChartNotesForm">
                    <input type="hidden" id="notesPatientId">
                    <div class="form-group">
                        <label class="form-label">Tooth Number</label>
                        <select id="toothNumber" class="form-control">
                            <option value="">Select Tooth...</option>
                            <!-- Upper Teeth -->
                            <optgroup label="Upper Teeth">
                                <option value="18">18 - Upper Right Wisdom</option>
                                <option value="17">17 - Upper Right 2nd Molar</option>
                                <option value="16">16 - Upper Right 1st Molar</option>
                                <option value="15">15 - Upper Right 2nd Premolar</option>
                                <option value="14">14 - Upper Right 1st Premolar</option>
                                <option value="13">13 - Upper Right Canine</option>
                                <option value="12">12 - Upper Right Lateral Incisor</option>
                                <option value="11">11 - Upper Right Central Incisor</option>
                                <option value="21">21 - Upper Left Central Incisor</option>
                                <option value="22">22 - Upper Left Lateral Incisor</option>
                                <option value="23">23 - Upper Left Canine</option>
                                <option value="24">24 - Upper Left 1st Premolar</option>
                                <option value="25">25 - Upper Left 2nd Premolar</option>
                                <option value="26">26 - Upper Left 1st Molar</option>
                                <option value="27">27 - Upper Left 2nd Molar</option>
                                <option value="28">28 - Upper Left Wisdom</option>
                            </optgroup>
                            <!-- Lower Teeth -->
                            <optgroup label="Lower Teeth">
                                <option value="48">48 - Lower Right Wisdom</option>
                                <option value="47">47 - Lower Right 2nd Molar</option>
                                <option value="46">46 - Lower Right 1st Molar</option>
                                <option value="45">45 - Lower Right 2nd Premolar</option>
                                <option value="44">44 - Lower Right 1st Premolar</option>
                                <option value="43">43 - Lower Right Canine</option>
                                <option value="42">42 - Lower Right Lateral Incisor</option>
                                <option value="41">41 - Lower Right Central Incisor</option>
                                <option value="31">31 - Lower Left Central Incisor</option>
                                <option value="32">32 - Lower Left Lateral Incisor</option>
                                <option value="33">33 - Lower Left Canine</option>
                                <option value="34">34 - Lower Left 1st Premolar</option>
                                <option value="35">35 - Lower Left 2nd Premolar</option>
                                <option value="36">36 - Lower Left 1st Molar</option>
                                <option value="37">37 - Lower Left 2nd Molar</option>
                                <option value="38">38 - Lower Left Wisdom</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Condition</label>
                        <select id="toothCondition" class="form-control">
                            <option value="">Select Condition...</option>
                            <option value="normal">Normal</option>
                            <option value="caries">Caries</option>
                            <option value="filling">Filling</option>
                            <option value="crown">Crown</option>
                            <option value="bridge">Bridge</option>
                            <option value="implant">Implant</option>
                            <option value="extraction">Extraction</option>
                            <option value="rootcanal">Root Canal</option>
                            <option value="missing">Missing</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Notes</label>
                        <textarea id="toothNotes" class="form-control" rows="3"
                            placeholder="Detailed notes..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Treatment Required</label>
                        <input type="text" id="treatmentRequired" class="form-control"
                            placeholder="e.g., Filling, Crown, Extraction">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.close('dentalChartNotesModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveDentalChartNotes()">Save Notes</button>
            </div>
        </div>
    </div>

    <script>
        // Preserve ?id= query param across tabs
        (function () {
            const params = new URLSearchParams(window.location.search);
            const patientId = params.get('id') || '';
            const qs = patientId ? `?id=${patientId}` : '';

            const tabs = {
                'tab-overview': 'patient-profile.html',
                'tab-dental': 'dental-chart.html',
                'tab-appointments': 'appointments.html',
                'tab-prescriptions': 'prescriptions.html',
                'tab-billing': 'billing.html',
                'tab-reports': 'reports.html'
            };
            for (const [id, url] of Object.entries(tabs)) {
                const el = document.getElementById(id);
                if (el) el.href = `${url}${qs}`;
            }
        })();
    </script>
