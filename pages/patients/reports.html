        <section class="page-content">
            <div id="profileHero" class="profile-hero-container">

                        <div class="profile-hero-info">
                            <!-- Removed redundant identity fields to prevent ID conflicts with dynamic dashboard -->
                        </div>
                        <div class="profile-hero-stats" id="heroStats" style="width: 100%;">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <div class="tabs" id="profileTabNav">
                    <a class="tab" id="tab-overview" href="patient-profile.html">Overview</a>
                    <a class="tab" id="tab-dental" href="dental-chart.html">Dental Chart</a>
                    <a class="tab" id="tab-appointments" href="appointments.html">Appointments</a>

                    <a class="tab" id="tab-billing" href="billing.html">Billing</a>
                    <a class="tab active" id="tab-reports" href="reports.html">Reports</a>
                </div>
            </div>

            <header class="page-header">
                <div class="header-title">
                    <h2>Patient Reports</h2>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="handleSyncFolderClick()"
                        title="Sync newly scanned images">
                        🔄 Sync
                    </button>
                    <button class="btn btn-secondary" onclick="handleLinkFolderClick()"
                        title="Link this patient to a scanner folder">
                        🔗 Link Folder
                    </button>
                    <button class="btn btn-primary" onclick="handleReportUploadClick()">
                        📎 Upload Report
                    </button>
                    <!-- Fallback for Web Browser testing -->
                    <input type="file" id="webReportUpload" multiple style="display:none;"
                        onchange="handleWebUpload(this)">
                </div>
            </header>
            <!-- Reports table -->
            <div class="card" style="margin-top: 1rem;">
                <div class="table-responsive">
                    <table class="table" id="reportTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Filename</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Pagination Controls -->
            <div id="reportPagination" class="pagination-controls"></div>


        </section>

        <!-- Edit Report Modal -->
        <div class="modal-overlay" id="editReportModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Report Details</h3>
                    <button class="modal-close">×</button>
                </div>
                <div class="modal-body">
                    <form id="editReportForm">
                        <input type="hidden" id="editReportId">
                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" id="editReportCategory" class="form-control"
                                placeholder="e.g. X-ray, MRI, Scan">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="editReportDescription" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="form-actions"
                            style="margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px;">
                            <button type="button" class="btn btn-secondary"
                                onclick="Modal.close('editReportModal')">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        </main>
    </div>

    <!-- Edit Medical Snapshot Modal -->
    <div id="editMedicalModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Edit Medical Snapshot</h3>
                <button class="modal-close" onclick="Modal.close('editMedicalModal')">×</button>
            </div>
            <div class="modal-body">
                <form id="editMedicalForm">
                    <input type="hidden" id="editMedicalPatientId">
                    <div class="form-group">
                        <label class="form-label">Medications</label>
                        <textarea id="edit_medications" class="form-control" rows="3"
                            placeholder="Enter current medications..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Allergies</label>
                        <textarea id="edit_allergies" class="form-control" rows="3"
                            placeholder="Enter known allergies..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.close('editMedicalModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveMedicalSnapshot()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Patient Notes Modal -->
    <div id="patientNotesModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title">Clinical Notes</h3>
                <button class="modal-close" onclick="Modal.close('patientNotesModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Patient observations and additional records</label>
                    <textarea id="modalNotesText" class="form-control" rows="12"
                        placeholder="Write any additional records here..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Modal.close('patientNotesModal')">Close</button>
                <button class="btn btn-primary" onclick="saveNotesFromModal()">Save Notes</button>
            </div>
        </div>
    </div>

    <script>
        // Preserve ?id= query param across tabs
        (function () {
            const params = new URLSearchParams(window.location.search);
            const patientId = params.get('id') || '';
            const qs = patientId ? `?id=${patientId}` : '';

            const tabs = {
                'tab-overview': 'patient-profile.html',
                'tab-dental': 'dental-chart.html',
                'tab-appointments': 'appointments.html',
                'tab-prescriptions': 'prescriptions.html',
                'tab-billing': 'billing.html',
                'tab-reports': 'reports.html'
            };
            for (const [id, url] of Object.entries(tabs)) {
                const el = document.getElementById(id);
                if (el) el.href = `${url}${qs}`;
            }
        })();
    </script>
